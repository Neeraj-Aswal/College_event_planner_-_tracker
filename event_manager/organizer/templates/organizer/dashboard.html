<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Organizer Dashboard</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1f4037, #99f2c8);
            color: white;
        }

        .navbar {
            background: rgba(0,0,0,0.3);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar h2 {
            margin: 0;
        }

        .navbar a {
            color: white;
            text-decoration: none;
            margin-left: 15px;
            font-weight: bold;
        }

        .container {
            padding: 50px;
            text-align: center;
        }

        .welcome {
            font-size: 26px;
            margin-bottom: 10px;
        }

        .role {
            font-size: 14px;
            opacity: 0.8;
            margin-bottom: 30px;
        }

        .card-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .card {
            background: white;
            color: black;
            width: 250px;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            text-align: center;
            transition: transform 0.2s;
        }

        .card:hover {
            transform: scale(1.05);
        }

        .btn {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 15px;
            background: #1f4037;
            color: white;
            text-decoration: none;
            border-radius: 8px;
        }

        .btn:hover {
            background: #145c4a;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <h2>🎉 Organizer Panel</h2>
    <div>
        <a href="{% url 'my_events' %}">My Events</a>
        <a href="{% url 'create_event' %}">Create Event</a>
        <a href="{% url 'profile' %}">Profile</a>
        <a href="{% url 'logout' %}">Logout</a>
    </div>
</div>

<!-- CONTENT -->
<div class="container">

    <div class="welcome">
        Welcome, {{ request.user.first_name }}
    </div>

    <div class="role">
        Role: {{ request.user.role }}
    </div>

    <div class="card-container">

        <div class="card">
            <h3>🎉 Create Event</h3>
            <p>Add new college events easily.</p>
            <a href="{% url 'create_event' %}" class="btn">Create</a>
        </div>

        <div class="card">
            <h3>📋 My Events</h3>
            <p>View and manage your events.</p>
            <a href="{% url 'my_events' %}" class="btn">View</a>
        </div>

        <div class="card">
            <h3>👤 Profile</h3>
            <p>Check your account details.</p>
            <a href="{% url 'profile' %}" class="btn">Open</a>
        </div>

    </div>

</div>

</body>
</html>
